<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff2896"/>
    </linearGradient>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0a0a19"/>
  
  <!-- Center line (dashed net) -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#39ff14" stroke-width="2" stroke-dasharray="4,3" opacity="0.7"/>
  
  <!-- Left paddle -->
  <rect x="10" y="24" width="4" height="16" rx="2" fill="url(#glow)" stroke="#00ffff" stroke-width="1.5" filter="url(#neon)"/>
  
  <!-- Right paddle -->
  <rect x="50" y="24" width="4" height="16" rx="2" fill="url(#glow)" stroke="#ff2896" stroke-width="1.5" filter="url(#neon)"/>
  
  <!-- Ball -->
  <circle cx="32" cy="32" r="5" fill="#f5f5ff" stroke="url(#glow)" stroke-width="2" filter="url(#neon)"/>
  
  <!-- Subtle glow ring around ball -->
  <circle cx="32" cy="32" r="9" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.4"/>
  
  <!-- Corner accents -->
  <circle cx="8" cy="8" r="2" fill="#00ffff" opacity="0.6"/>
  <circle cx="56" cy="56" r="2" fill="#ff2896" opacity="0.6"/>
</svg>